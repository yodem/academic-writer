name: Validate Plugin

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pyyaml
          sudo apt-get update && sudo apt-get install -y jq

      - name: Build plugin
        run: npm run build

      - name: Run plugin validation tests
        run: python -m unittest discover tests/ -v

      - name: Validate JSON files
        run: |
          echo "Checking all JSON files are valid..."
          find . -name "*.json" -not -path "./.git/*" -not -path "*/node_modules/*" | while read f; do
            python -c "import json; json.load(open('$f'))" || exit 1
            echo "  ✓ $f"
          done

      - name: Validate skill frontmatter
        run: |
          python3 -c "
          import os, re, yaml, sys
          errors = []
          for root, dirs, files in os.walk('src/skills'):
              for f in files:
                  if f == 'SKILL.md':
                      path = os.path.join(root, f)
                      text = open(path).read()
                      m = re.match(r'^---\n(.*?\n)---', text, re.DOTALL)
                      if not m:
                          errors.append(f'{path}: no frontmatter')
                          continue
                      try:
                          fm = yaml.safe_load(m.group(1))
                          assert 'name' in fm, 'missing name'
                          assert 'description' in fm, 'missing description'
                          print(f'  ✓ {path}: {fm[\"name\"]}')
                      except Exception as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Check plugin mirror is in sync
        run: |
          python3 -c "
          import os, sys
          main = set(d for d in os.listdir('src/skills') if os.path.isdir(f'src/skills/{d}'))
          plugin = set(d for d in os.listdir('plugins/academic-writer/skills') if os.path.isdir(f'plugins/academic-writer/skills/{d}'))
          missing = main - plugin
          if missing:
              print(f'Plugin missing skills: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'  ✓ All {len(main)} skills mirrored in plugin directory')
          "
